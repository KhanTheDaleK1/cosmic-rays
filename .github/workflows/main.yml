name: Cosmic Rays CI/CD - 2026 Deployment Standard

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # Force Node.js 24 for 2026 standards
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build_and_package:
    name: Build & Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macOS-Installer
            package_extension: pkg
          - os: windows-latest
            artifact_name: Windows-Installer
            package_extension: exe
          - os: ubuntu-latest
            artifact_name: Linux-Installer
            package_extension: deb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install tzdata

      - name: Generate Fresh Version Timestamp
        # This MUST run before CMake configuration to ensure filenames match
        run: python3 generate_version.py
        shell: bash

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxkbcommon-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev \
            freeglut3-dev ninja-build

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja innosetup
          echo "C:\Program Files (x86)\Inno Setup 6" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Package with CPack
        run: |
          cd build
          cpack -C Release

      - name: Upload Native Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          # Using a broader glob to ensure we catch the versioned filename
          path: build/*.${{ matrix.package_extension }}
          if-no-files-found: error
          retention-days: 1

  publish_release:
    name: Publish GitHub Release
    needs: build_and_package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten Artifacts
        run: |
          mkdir release_assets
          # Find all installers regardless of timestamp
          find artifacts -name "*.pkg" -exec cp {} release_assets/ \;
          find artifacts -name "*.exe" -exec cp {} release_assets/ \;
          find artifacts -name "*.deb" -exec cp {} release_assets/ \;
          ls -R release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Deployment Build' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          make_latest: true
          draft: false
          prerelease: false
          generate_release_notes: true

  sync_to_gumroad:
    name: Sync to Gumroad
    needs: publish_release
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && vars.GUMROAD_PRODUCT_ID != ''
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Gumroad
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          PRODUCT_ID: ${{ vars.GUMROAD_PRODUCT_ID }}
        run: |
          # Loop through all downloaded installers and push to Gumroad
          find artifacts -type f \( -name "*.pkg" -o -name "*.exe" -o -name "*.deb" \) | while read file; do
            filename=$(basename "$file")
            echo "Uploading $filename to Gumroad..."
            curl -X POST "https://api.gumroad.com/v2/products/$PRODUCT_ID/assets" \
                 -H "Authorization: Bearer $GUMROAD_TOKEN" \
                 -F "file=@$file" \
                 -F "name=$filename"
          done
