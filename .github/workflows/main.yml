name: Cosmic Rays CI/CD - 2026 Deployment Standard

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build_and_package:
    name: Build & Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macOS-Installer
            package_extension: pkg
          - os: windows-latest
            artifact_name: Windows-Installer
            package_extension: exe
          - os: ubuntu-latest
            artifact_name: Linux-Installer
            package_extension: deb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python Dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install tzdata

      - name: Generate Fresh Version Timestamp
        id: versioning
        run: |
          python3 Scripts/generate_version.py
          # Export the version to a GitHub environment variable for later jobs
          echo "PROJECT_VERSION=$(cat version.txt)" >> $GITHUB_ENV
        shell: bash

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxkbcommon-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev libglu1-mesa-dev mesa-common-dev \
            freeglut3-dev ninja-build

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja innosetup
          echo "C:\Program Files (x86)\Inno Setup 6" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Package with CPack
        run: |
          cd build
          cpack -C Release

      - name: Upload Native Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: build/*.${{ matrix.package_extension }}
          if-no-files-found: error
          retention-days: 1

  publish_release:
    name: Publish GitHub Release
    needs: build_and_package
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Configure Bot Identity
        run: |
          git config --global user.name "Cosmic Rays Bot"
          git config --global user.email "bot@cosmic.audio"

      - name: Get Version
        run: |
          # We download the artifact to get the version.txt generated in the previous job
          find artifacts -name "version.txt" | head -n 1 | xargs cat > version.txt || echo "latest" > version.txt
          echo "RELEASE_VERSION=$(cat version.txt)" >> $GITHUB_ENV

      - name: Flatten Artifacts
        run: |
          mkdir release_assets
          # STRICT FILTER: Only grab the actual CosmicRays installers
          find artifacts -name "CosmicRays-*.pkg" -exec cp {} release_assets/ \;
          find artifacts -name "CosmicRays-*.exe" -exec cp {} release_assets/ \;
          find artifacts -name "CosmicRays-*.deb" -exec cp {} release_assets/ \;
          
          # Rename for generic 'latest' links
          cd release_assets
          mv CosmicRays-${{ env.RELEASE_VERSION }}-Windows.exe CosmicRays-Windows.exe || true
          mv CosmicRays-${{ env.RELEASE_VERSION }}-Darwin.pkg CosmicRays-Darwin.pkg || true
          mv CosmicRays-${{ env.RELEASE_VERSION }}-Linux.deb CosmicRays-Linux.deb || true
          ls -R .

      - name: Wipe and Recreate Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Delete the existing 'latest' release if it exists
          gh release delete latest -y --cleanup-tag || true
          
          # 2. Create the new clean release
          gh release create latest \
            --title "Cosmic Rays Beta - ${{ env.RELEASE_VERSION }}" \
            --notes "Freshly compiled on ${{ env.RELEASE_VERSION }}. Includes macOS, Windows, and Linux installers." \
            --prerelease \
            release_assets/CosmicRays-Windows.exe \
            release_assets/CosmicRays-Darwin.pkg \
            release_assets/CosmicRays-Linux.deb

      - name: Create Historical Version Tag
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.RELEASE_VERSION }}
          tag_name: v${{ env.RELEASE_VERSION }}
          make_latest: false
          draft: false
          prerelease: false
          generate_release_notes: true

  sync_to_gumroad:
    name: Sync to Gumroad
    needs: publish_release
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) && vars.GUMROAD_PRODUCT_ID != ''
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Link GitHub Assets to Gumroad
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          PRODUCT_ID: ${{ vars.GUMROAD_PRODUCT_ID }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          # Instead of uploading (which hits a 413 error), we link directly to the GitHub Release assets.
          # This is faster and avoids size limits.
          
          # We'll link the three main installers
          PLATFORMS=("Windows" "Darwin" "Linux")
          EXTENSIONS=("exe" "pkg" "deb")
          
          for i in "${!PLATFORMS[@]}"; do
            PLATFORM=${PLATFORMS[$i]}
            EXT=${EXTENSIONS[$i]}
            
            # Construct the exact URL for the asset in the GitHub Release
            # Note: We use the RELEASE_VERSION gathered in the previous step
            ASSET_URL="https://github.com/KhanTheDaleK1/cosmic-rays/releases/download/v${RELEASE_VERSION}/CosmicRays-${RELEASE_VERSION}-${PLATFORM}.${EXT}"
            
            echo "Linking $PLATFORM installer ($ASSET_URL) to Gumroad..."
            
            curl -s -X POST "https://api.gumroad.com/v2/products/$PRODUCT_ID/external_files" \
                 -H "Authorization: Bearer $GUMROAD_TOKEN" \
                 -d "url=$ASSET_URL" \
                 -d "name=Cosmic Rays Beta (${PLATFORM})"
          done
