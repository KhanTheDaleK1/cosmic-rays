name: Cosmic Rays CI/CD - 2026 Deployment Standard

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # 1. SETUP JOB: Generate the version once and share it with everyone
  setup:
    name: Setup & Versioning
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.versioning.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: pip install tzdata

      - name: Generate Version
        id: versioning
        run: |
          python3 cmake/generate_version.py
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated Master Version: $VERSION"

      - name: Upload Version Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: version-metadata
          path: |
            version.txt
            source/Version.h
          retention-days: 1

  # 2. BUILD JOB: Compile on all platforms using the master version
  build_and_package:
    name: Build & Package on ${{ matrix.os }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: macOS-Installer
            package_extension: pkg
          - os: windows-latest
            artifact_name: Windows-Installer
            package_extension: exe
          - os: ubuntu-latest
            artifact_name: Linux-Installer
            package_extension: deb

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Version Metadata
        uses: actions/download-artifact@v4
        with:
          name: version-metadata

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxkbcommon-dev libxrandr-dev libxrender-dev \
            libfreetype6-dev libcurl4-openssl-dev libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev mesa-common-dev freeglut3-dev ninja-build

      - name: Install System Dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install System Dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ninja innosetup
          echo "C:\Program Files (x86)\Inno Setup 6" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build Plugin
        run: cmake --build build --config Release

      - name: Package with CPack
        run: |
          cd build
          cpack -C Release

      - name: Upload Native Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/*.${{ matrix.package_extension }}
          if-no-files-found: error
          retention-days: 1

  # 3. RELEASE JOB: Publish to GitHub and Gumroad
  publish_release:
    name: Publish GitHub Release
    needs: [setup, build_and_package]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Configure Bot Identity
        run: |
          git config --global user.name "Cosmic Rays Bot"
          git config --global user.email "bot@cosmic.audio"

      - name: Prepare Final Assets
        env:
          VERSION: ${{ needs.setup.outputs.project_version }}
        run: |
          mkdir -p release_assets
          # Clean up subfolder structure from download-artifact
          cp artifacts/Windows-Installer/CosmicRays-${VERSION}-Windows.exe release_assets/CosmicRays-Windows.exe
          cp artifacts/macOS-Installer/CosmicRays-${VERSION}-Darwin.pkg release_assets/CosmicRays-Darwin.pkg
          cp artifacts/Linux-Installer/CosmicRays-${VERSION}-Linux.deb release_assets/CosmicRays-Linux.deb
          
          # Copy timestamped versions for the historical release
          cp artifacts/Windows-Installer/CosmicRays-${VERSION}-Windows.exe release_assets/
          cp artifacts/macOS-Installer/CosmicRays-${VERSION}-Darwin.pkg release_assets/
          cp artifacts/Linux-Installer/CosmicRays-${VERSION}-Linux.deb release_assets/

      - name: Create Versioned Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.project_version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Cosmic Rays Beta ${VERSION}" \
            --notes "Automated build for version ${VERSION}" \
            release_assets/CosmicRays-${VERSION}-*

      - name: Nuke and Recreate Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.project_version }}
        run: |
          gh release delete latest -y --cleanup-tag || true
          sleep 5
          gh release create latest \
            --title "Cosmic Rays Beta (Latest)" \
            --notes "Latest build. Master Version: ${VERSION}" \
            --prerelease \
            release_assets/CosmicRays-Windows.exe \
            release_assets/CosmicRays-Darwin.pkg \
            release_assets/CosmicRays-Linux.deb

  # 4. GUMROAD JOB: Sync the latest files to Gumroad
  sync_to_gumroad:
    name: Sync to Gumroad
    needs: [setup, publish_release]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')) && vars.GUMROAD_PRODUCT_ID != ''
    steps:
      - name: Link GitHub Assets to Gumroad
        env:
          GUMROAD_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          PRODUCT_ID: ${{ vars.GUMROAD_PRODUCT_ID }}
        run: |
          BASE_URL="https://github.com/KhanTheDaleK1/cosmic-rays/releases/latest/download"
          
          # Explicitly link the three main platforms
          for PLATFORM in Windows Darwin Linux; do
            EXT="exe"
            if [ "$PLATFORM" == "Darwin" ]; then EXT="pkg"; elif [ "$PLATFORM" == "Linux" ]; then EXT="deb"; fi
            
            ASSET_URL="${BASE_URL}/CosmicRays-${PLATFORM}.${EXT}"
            echo "Linking Latest $PLATFORM installer to Gumroad..."
            
            curl -s -X POST "https://api.gumroad.com/v2/products/$PRODUCT_ID/external_files" \
                 -H "Authorization: Bearer $GUMROAD_TOKEN" \
                 -d "url=$ASSET_URL" \
                 -d "name=Cosmic Rays Beta (${PLATFORM})"
          done
