name: "Feature Request"
description: "Suggest a new granular synthesis feature or UI improvement."
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: "Feature Description"
      placeholder: "Describe the new feature or improvement..."
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: "Rationale"
      placeholder: "How does this improve the user's workflow or sound design?"
    validations:
      required: true
