# .github/dependabot.yml
# Dependabot configuration for Cosmic Rays (CPM, Python, and Actions)

version: 2
updates:
  # 1. GitHub Actions & Repository Monitoring (Weekly updates)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "juce-framework/JUCE"
        update-types: ["version-update:semver-major"] # Prevent breaking changes from JUCE 9+ for now

  # 2. Python Dependencies (for versioning and deployment scripts)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "python"
